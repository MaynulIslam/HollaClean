<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  
  <!-- Primary Meta Tags -->
  <title>HollaClean - Professional Cleaning Services in Ontario</title>
  <meta name="title" content="HollaClean - Professional Cleaning Services in Ontario" />
  <meta name="description" content="Connect with trusted cleaning professionals in your area. Book services instantly, manage appointments, and build your cleaning business." />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hollaclean.com/" />
  <meta property="og:title" content="HollaClean - Professional Cleaning Services" />
  <meta property="og:description" content="Connect with trusted cleaning professionals in your area. Book services instantly." />
  <meta property="og:image" content="https://hollaclean.com/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://hollaclean.com/" />
  <meta property="twitter:title" content="HollaClean - Professional Cleaning Services" />
  <meta property="twitter:description" content="Connect with trusted cleaning professionals in your area." />
  <meta property="twitter:image" content="https://hollaclean.com/twitter-image.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#9333ea" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  
  <!-- iOS Meta Tags -->
  <meta name="apple-mobile-web-app-title" content="HollaClean" />
  
  <!-- Disable tap highlight on IE -->
  <meta name="msapplication-tap-highlight" content="no" />
  
  <!-- Safe Area -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  
  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(to bottom right, #faf5ff, #fce7f3, #fed7aa);
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    
    html {
      height: -webkit-fill-available;
    }
    
    #root {
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    
    /* Loading Screen */
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #9333ea 0%, #ec4899 100%);
      z-index: 9999;
    }
    
    .loading-logo {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 1s ease-in-out infinite;
    }
    
    .loading-text {
      color: white;
      font-size: 2rem;
      font-weight: bold;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 0.5rem;
    }
    
    .loading-subtext {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1rem;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      margin-top: 1rem;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Prevent iOS zoom on input focus */
    @media screen and (max-width: 768px) {
      input,
      textarea,
      select {
        font-size: 16px !important;
      }
    }
    
    /* Hide loading screen when app loads */
    .app-loaded .loading-screen {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading-screen">
    <div class="loading-logo">✨</div>
    <div class="loading-text">HollaClean</div>
    <div class="loading-subtext">Loading your cleaning marketplace...</div>
    <div class="loading-spinner"></div>
  </div>
  
  <!-- React App Root -->
  <div id="root"></div>
  
  <!-- App Entry Point -->
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('SW registered:', registration);
          })
          .catch(error => {
            console.log('SW registration failed:', error);
          });
      });
    }
    
    // Hide loading screen when app is ready
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.body.classList.add('app-loaded');
      }, 500);
    });
    
    // Install prompt for PWA
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // You can show your own install button here
      console.log('Install prompt available');
    });
    
    // Track install
    window.addEventListener('appinstalled', () => {
      console.log('PWA was installed');
      deferredPrompt = null;
    });
  </script>
  
  <!-- Structured Data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "HollaClean",
    "description": "Professional cleaning marketplace connecting homeowners with trusted cleaning professionals",
    "url": "https://hollaclean.com",
    "telephone": "+1-XXX-XXX-XXXX",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Ontario",
      "addressCountry": "CA"
    },
    "priceRange": "$$",
    "areaServed": {
      "@type": "State",
      "name": "Ontario"
    }
  }
  </script>
</body>
</html>
