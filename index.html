
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>HollaClean - Home Cleaning Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            },
            colors: {
              primary: '#9333ea',
              secondary: '#ec4899',
              accent: '#f97316',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #f3e8ff 0%, #fce7f3 50%, #ffedd5 100%);
        min-height: 100vh;
      }
      h1, h2, h3, h4 {
        font-family: 'Outfit', sans-serif;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .safe-area-bottom {
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Shiny Text Animation */
      @keyframes shine {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      .animate-shine {
        background: linear-gradient(
          to right, 
          #9333ea 20%, 
          #ec4899 40%, 
          #ffffff 50%, 
          #ec4899 60%, 
          #9333ea 80%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shine 3s linear infinite;
      }

      /* Zoom In/Out Star Animation */
      @keyframes zoom-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.25); }
      }
      .animate-zoom-pulse {
        animation: zoom-pulse 2s ease-in-out infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",

    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>

</html>
